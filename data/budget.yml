# ============================================================
# BREAK-EVEN ANALYSIS
# ============================================================

break_even:
  notes: |
    At $75/hr rental (cheapest option):
    - Each hour of instructing at $40/hr offsets 0.53 hours of rental ($40/$75)
    - To offset 1 hour of $75 rental, need 1.875 hours at $40/hr
    - To offset 1 hour of $75 rental, need 1.5 hours at $50/hr
    - To offset 1 hour of $75 rental, need 1.25 hours at $60/hr

    Instructing is ALWAYS better than renting because:
    1. You earn money instead of spending it
    2. You still log flight hours (dual given counts)
    3. You build connections for future airline apps
    4. Schools may offer free aircraft time as a perk
