# Flight School Jobs -- Portal Scanner Configuration
# All flight schools within 60 min of East Point, GA

title_filter:
  positive:
    - CFI
    - CFII
    - flight instructor
    - instrument instructor
    - aviation instructor
    - ground instructor
    - certified flight instructor
  negative:
    - A&P
    - mechanic
    - dispatcher
    - ramp
    - line service
    - admin
    - receptionist
    - fueler

